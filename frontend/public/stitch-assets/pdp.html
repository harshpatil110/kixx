<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>KIXX Liquid Glass PDP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#800000", // Maroon
              "background-light": "#f5f5f5",
              "background-dark": "#0a0a0a",
              glass: {
                light: "rgba(255, 255, 255, 0.7)",
                dark: "rgba(0, 0, 0, 0.7)",
                borderLight: "rgba(255, 255, 255, 0.2)",
                borderDark: "rgba(255, 255, 255, 0.1)",
              },
            },
            fontFamily: {
              display: ["Anton", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
            },
            boxShadow: {
              "glass-light": "0 8px 32px 0 rgba(31, 38, 135, 0.1)",
              "glass-dark": "0 8px 32px 0 rgba(0, 0, 0, 0.3)",
            },
          },
        },
      };
    </script>
    <style>
      .backdrop-blur-glass {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        z-index: -1;
        opacity: 0.5;
        animation: float 20s infinite ease-in-out alternate;
      }
      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(50px, -50px) scale(1.1);
        }
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-white font-body min-h-screen relative overflow-x-hidden transition-colors duration-300"
  >
    <div
      class="orb w-[500px] h-[500px] bg-red-200 dark:bg-red-900/30 top-[-100px] left-[-100px]"
    ></div>
    <div
      class="orb w-[400px] h-[400px] bg-blue-200 dark:bg-blue-900/30 bottom-[-50px] right-[-100px]"
      style="animation-delay: -5s"
    ></div>
    <main class="w-full min-h-screen flex flex-col md:flex-row pb-24 md:pb-0">
      <section
        class="w-full md:w-1/2 h-[50vh] md:h-screen sticky top-0 md:relative z-10"
      >
        <div
          class="w-full h-full relative overflow-hidden hide-scrollbar flex snap-x snap-mandatory overflow-x-auto"
        >
          <img
            alt="Red Nike Sneaker Angle 1"
            class="w-full h-full object-cover shrink-0 snap-center"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGchdcv-fAStknZOX8AwrFevurA2pbaIQKOtnyjxwd5fuvKUVaGzxIaOwAHxJMiX-hIwyizIPOSYOlu3aUthXRBnCuCPvU5UJ55GpFzMTyd8_fQoeRRGOdgE2DU773alWZ7TAWKApxdzs9mVmavmrjq6jv4R0H7BXjsmWNNdOqUnAPUtILWepdzojSDsCuxuXOUnznfKtZtLmfKNSCK-Mlx5U2pck31F82St24azQLjaAxYpP01vVMMXoVlQVCTZRC0yM2SYQhuaSQ"
          />
          <img
            alt="Red Nike Sneaker Angle 2"
            class="w-full h-full object-cover shrink-0 snap-center"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYpraUiACla7JdnC0RXuyxITe__hmeayhAXRBuD16HBj8e913YE2CyvanEqPFqVNT_JTQ3hD189iODNB7zVyVgzUe7F7c5lQGgNqzpk2TZoBYTMsgZciBJXMHHmXMCtNtUwAuI-6TVvXEnxbI6AKEeDEboi0zRj7SjUIo3gaC5Olx9x1Q0hwLGwRbuXLd2t6Q3zJUMI3dFUkJOI6LUl7XKWjba8rP1HAzkj8-Xn34kEi3cA1gZxSZBhXa-1Y5xReywecL1yeXRMXqM"
          />
          <img
            alt="Red Nike Sneaker Angle 3"
            class="w-full h-full object-cover shrink-0 snap-center"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAfIiczj8D32rtGkhKliwm0_xAzkfhJEWCsOnF2opx_gM1zPCD-xAn4Ka_88p8ztob7lfy_H-KRF3HvPMsjSKFasJ5vkBoBlZjaVqO40mGC6edVYOsuwjr8pElDAC85uX3U9a4tcU7XehiMMTvOZuwzUTSQfw_IRR-8kkUjbvxw4M7yRLCuAyK7J4YFpX7TJcRrIi2X-q6qlT0BbgYVaDEbF3oI5CYTkY1-xVis9xceGNvM2BHcodyqIBWcdjTixF6I2mGjmANA6WLM"
          />
          <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2">
            <div class="w-2 h-2 rounded-full bg-white opacity-100"></div>
            <div class="w-2 h-2 rounded-full bg-white opacity-50"></div>
            <div class="w-2 h-2 rounded-full bg-white opacity-50"></div>
          </div>
        </div>
        <button
          class="absolute top-6 left-6 w-12 h-12 flex items-center justify-center rounded-full bg-glass-light dark:bg-glass-dark border border-glass-borderLight dark:border-glass-borderDark backdrop-blur-glass shadow-glass-light dark:shadow-glass-dark z-20 text-gray-900 dark:text-white transition-transform hover:scale-105"
        >
          <span class="material-icons">arrow_back</span>
        </button>
        <button
          class="absolute top-6 right-6 w-12 h-12 flex items-center justify-center rounded-full bg-glass-light dark:bg-glass-dark border border-glass-borderLight dark:border-glass-borderDark backdrop-blur-glass shadow-glass-light dark:shadow-glass-dark z-20 text-gray-900 dark:text-white transition-transform hover:scale-105"
        >
          <span class="material-icons">favorite_border</span>
        </button>
      </section>
      <section
        class="w-full md:w-1/2 p-8 md:p-16 lg:p-24 flex flex-col justify-center min-h-[50vh] z-20"
      >
        <div class="max-w-xl">
          <p
            class="text-sm font-semibold tracking-widest uppercase text-gray-500 dark:text-gray-400 mb-4"
          >
            New Release
          </p>
          <h1
            class="font-display text-6xl md:text-8xl lg:text-9xl uppercase leading-[0.85] tracking-tight mb-6"
          >
            Air Max<br />
            Pulse<br />
            Roam
          </h1>
          <p class="text-3xl md:text-4xl font-medium mb-12">₹14,999</p>
          <div class="mb-12 space-y-4 text-gray-600 dark:text-gray-300">
            <p>
              Designed for the city streets. The Air Max Pulse Roam takes cues
              from the London music scene, bringing an underground touch to the
              iconic Air Max line.
            </p>
          </div>
          <div class="mb-12">
            <div class="flex justify-between items-center mb-4">
              <h3 class="font-semibold uppercase tracking-wider text-sm">
                Select Size (UK)
              </h3>
              <a
                class="text-sm text-gray-500 dark:text-gray-400 hover:text-primary transition-colors underline decoration-dotted"
                href="#"
                >Size Guide</a
              >
            </div>
            <div class="grid grid-cols-4 sm:grid-cols-5 gap-3">
              <button
                class="h-14 flex items-center justify-center rounded-md bg-glass-light dark:bg-glass-dark border border-glass-borderLight dark:border-glass-borderDark backdrop-blur-glass shadow-glass-light dark:shadow-glass-dark text-gray-900 dark:text-white font-medium transition-all hover:-translate-y-1 hover:border-primary dark:hover:border-primary"
              >
                6
              </button>
              <button
                class="h-14 flex items-center justify-center rounded-md bg-glass-light dark:bg-glass-dark border border-glass-borderLight dark:border-glass-borderDark backdrop-blur-glass shadow-glass-light dark:shadow-glass-dark text-gray-900 dark:text-white font-medium transition-all hover:-translate-y-1 hover:border-primary dark:hover:border-primary"
              >
                7
              </button>
              <button
                class="h-14 flex items-center justify-center rounded-md bg-glass-light dark:bg-glass-dark border-2 border-primary backdrop-blur-glass shadow-glass-light dark:shadow-glass-dark text-gray-900 dark:text-white font-bold transition-all hover:-translate-y-1"
              >
                8
              </button>
              <button
                class="h-14 flex items-center justify-center rounded-md bg-glass-light dark:bg-glass-dark border border-glass-borderLight dark:border-glass-borderDark backdrop-blur-glass shadow-glass-light dark:shadow-glass-dark text-gray-900 dark:text-white font-medium transition-all hover:-translate-y-1 hover:border-primary dark:hover:border-primary"
              >
                9
              </button>
              <button
                class="h-14 flex items-center justify-center rounded-md bg-glass-light dark:bg-glass-dark border border-glass-borderLight dark:border-glass-borderDark backdrop-blur-glass shadow-glass-light dark:shadow-glass-dark text-gray-900 dark:text-white font-medium transition-all hover:-translate-y-1 hover:border-primary dark:hover:border-primary"
              >
                10
              </button>
              <button
                class="h-14 flex items-center justify-center rounded-md bg-glass-light dark:bg-glass-dark border border-glass-borderLight dark:border-glass-borderDark backdrop-blur-glass shadow-glass-light dark:shadow-glass-dark text-gray-900 dark:text-white font-medium transition-all hover:-translate-y-1 hover:border-primary dark:hover:border-primary opacity-50 cursor-not-allowed"
              >
                11
              </button>
              <button
                class="h-14 flex items-center justify-center rounded-md bg-glass-light dark:bg-glass-dark border border-glass-borderLight dark:border-glass-borderDark backdrop-blur-glass shadow-glass-light dark:shadow-glass-dark text-gray-900 dark:text-white font-medium transition-all hover:-translate-y-1 hover:border-primary dark:hover:border-primary"
              >
                12
              </button>
            </div>
          </div>
          <div class="border-t border-gray-200 dark:border-gray-800">
            <div
              class="py-6 flex justify-between items-center cursor-pointer group"
            >
              <h4
                class="font-display text-xl uppercase tracking-wider group-hover:text-primary transition-colors"
              >
                Product Details
              </h4>
              <span
                class="material-icons text-gray-400 group-hover:text-primary transition-colors"
                >add</span
              >
            </div>
            <div class="border-t border-gray-200 dark:border-gray-800"></div>
            <div
              class="py-6 flex justify-between items-center cursor-pointer group"
            >
              <h4
                class="font-display text-xl uppercase tracking-wider group-hover:text-primary transition-colors"
              >
                Delivery &amp; Returns
              </h4>
              <span
                class="material-icons text-gray-400 group-hover:text-primary transition-colors"
                >add</span
              >
            </div>
            <div class="border-t border-gray-200 dark:border-gray-800"></div>
          </div>
          <div class="h-24 md:hidden"></div>
        </div>
      </section>
    </main>
    <div
      class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] md:w-auto max-w-lg z-50"
    >
      <div
        class="rounded-[32px] bg-glass-light dark:bg-glass-dark border border-glass-borderLight dark:border-glass-borderDark backdrop-blur-glass shadow-[0_20px_40px_rgba(0,0,0,0.1)] dark:shadow-[0_20px_40px_rgba(0,0,0,0.4)] p-2 flex items-center justify-between gap-4"
      >
        <div class="hidden md:flex flex-col px-4">
          <span
            class="text-xs text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wider"
            >Total Price</span
          >
          <span class="font-bold text-lg leading-tight">₹14,999</span>
        </div>
        <button
          class="w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-full bg-white/10 dark:bg-black/10 hover:bg-white/20 dark:hover:bg-black/20 transition-colors"
        >
          <span class="material-icons">share</span>
        </button>
        <button
          class="flex-1 h-14 bg-primary hover:bg-[#600000] text-white rounded-[24px] font-display text-xl uppercase tracking-wider transition-colors flex items-center justify-center shadow-lg"
        >
          Add To Cart
        </button>
      </div>
    </div>
  </body>
</html>
